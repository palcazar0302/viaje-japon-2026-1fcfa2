<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#eef3fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Japón 2026">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<title>Japón 2026</title>
<style>
  :root{
    --bg1:#eef3fb; --bg2:#e4ecf8; --bg3:#f4f1fb;
    --ink:#1f2430; --ink2:#5b6478; --ink3:#8a93a6;
    --card:#ffffff; --line:#e9edf5;
    --blue:#2f6df6; --blue-d:#1d54d6; --blue-soft:#e8f0ff;
    --green:#1fb866; --green-d:#16a058;
    --amber:#f4b740; --amber-soft:#fef3da;
    --red:#e7546b; --red-soft:#fde9ec;
    --teal:#13b5c4; --cyan:#22c3e6;
    --purple:#8b5cf6; --purple-soft:#efeafe;
    --slate:#64748b;
    --radius:22px; --radius-lg:26px;
    --shadow:0 10px 30px -12px rgba(31,46,84,.18), 0 2px 8px -4px rgba(31,46,84,.10);
    --shadow-sm:0 4px 14px -8px rgba(31,46,84,.22);
    --maxw:520px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 40%,var(--bg3) 100%);
    background-attachment:fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:var(--maxw);margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom));padding-top:max(14px,env(safe-area-inset-top))}
  .view{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* Headers */
  h1,h2,h3{margin:0;letter-spacing:-.02em}
  .page-title{font-size:30px;font-weight:900;margin-top:6px}
  .page-sub{color:var(--ink2);font-size:15px;margin-top:4px;line-height:1.35;font-weight:500}
  .jp{color:var(--blue);font-weight:600}
  .section-h{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;margin:22px 4px 12px}
  .section-h .ic{font-size:18px}
  .sub-section{font-size:12px;font-weight:800;letter-spacing:.06em;color:var(--ink3);text-transform:uppercase;margin:18px 6px 10px;display:flex;align-items:center;gap:7px}

  /* Cards */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .card.tight{padding:14px}
  .grad{position:relative;overflow:hidden}

  /* Photo with gradient fallback */
  .photo{position:relative;width:100%;background-size:cover;background-position:center;border-radius:18px;overflow:hidden}
  .photo .ph-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:54px;opacity:.92}
  .photo img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;opacity:0;transition:opacity .4s}
  .photo img.loaded{opacity:1}
  .photo .overlay{position:absolute;inset:0}
  .photo .dc-txt{position:absolute;left:16px;right:16px;bottom:14px;color:#fff}

  /* Hero */
  .hero{border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:6px;position:relative;height:210px;display:flex;align-items:flex-end}
  .hero .ph-emoji{font-size:84px}
  .hero-grad{position:absolute;inset:0;background:linear-gradient(160deg,#7fb2ff,#3b6fd4 55%,#21407e)}
  .hero-shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 30%,rgba(0,0,0,.55))}
  .hero-txt{position:relative;padding:20px;color:#fff}
  .hero-txt .scr{font-family:'Caveat',cursive;font-size:46px;line-height:.9;font-weight:700;text-shadow:0 2px 12px rgba(0,0,0,.35)}
  .hero-txt .dates{font-size:15px;font-weight:600;margin-top:6px;opacity:.95}
  .countdown{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.22);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.3);color:#fff;font-weight:700;font-size:13px;padding:5px 11px;border-radius:999px;margin-top:10px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;font-family:inherit;font-weight:700;font-size:15px;padding:12px 18px;cursor:pointer;transition:transform .12s,filter .15s;text-decoration:none}
  .btn:active{transform:scale(.96)}
  .btn-blue{background:var(--blue);color:#fff;box-shadow:0 6px 16px -6px var(--blue)}
  .btn-green{background:var(--green);color:#fff;box-shadow:0 6px 16px -6px var(--green)}
  .btn-gray{background:#eef1f6;color:#3a4254}
  .btn-ghost{background:var(--blue-soft);color:var(--blue-d)}
  .btn-sm{padding:9px 14px;font-size:14px;border-radius:12px}
  .btn-block{width:100%}
  .btn-row{display:flex;gap:9px;flex-wrap:wrap}

  /* Tags / chips */
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:999px}
  .t-blue{background:var(--blue-soft);color:var(--blue-d)}
  .t-green{background:#e4f7ec;color:var(--green-d)}
  .t-amber{background:var(--amber-soft);color:#a9781a}
  .t-red{background:var(--red-soft);color:#c23950}
  .t-purple{background:var(--purple-soft);color:#6d3fd4}
  .t-teal{background:#dff7fa;color:#0c8694}
  .t-slate{background:#eef1f6;color:#51607a}
  .tag-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}

  /* Place / list rows */
  .row{display:flex;gap:13px;align-items:center}
  .row .photo{width:92px;height:92px;flex:0 0 92px}
  .row .photo .ph-emoji{font-size:34px}
  .row-body{flex:1;min-width:0}
  .row-title{font-weight:800;font-size:16px;line-height:1.2}
  .row-loc{display:flex;align-items:center;gap:4px;color:var(--ink2);font-size:13px;font-weight:600;margin-top:3px}

  /* Callouts */
  .callout{border-radius:16px;padding:14px 15px;margin:12px 0;font-size:14.5px;line-height:1.5}
  .callout .co-h{font-weight:800;font-size:13px;letter-spacing:.02em;display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .co-amber{background:var(--amber-soft)}
  .co-amber .co-h{color:#b07d14}
  .co-blue{background:var(--blue-soft)}
  .co-blue .co-h{color:var(--blue-d)}
  .co-list{display:flex;flex-direction:column;gap:9px;margin:10px 0}
  .co-item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:14.5px;line-height:1.45}

  /* Day detail activity */
  .act{display:flex;gap:0;flex-direction:column}
  .act-num{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex:0 0 30px}

  /* Sleep / info bar */
  .infobar{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .info-lbl{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--ink3);text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .info-main{font-weight:800;font-size:17px;margin-top:3px}
  .info-sub{color:var(--ink2);font-size:13px;font-weight:600}

  .nav-card{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
  .copy-field{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px 15px;margin-bottom:10px}
  .cf-lbl{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--ink3);text-transform:uppercase}
  .cf-val{font-weight:800;font-size:17px;margin-top:2px;word-break:break-word}
  .copy-btn{background:none;border:none;color:var(--blue);font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;flex:0 0 auto;padding:6px}

  /* Quick grid */
  .qgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:6px}
  .qtile{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:transform .12s}
  .qtile:active{transform:scale(.96)}
  .qtile .qi{width:46px;height:46px;border-radius:14px;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;font-size:22px}
  .qtile .qt{font-weight:800;font-size:15px}

  /* Filters */
  .filters{display:flex;gap:9px;overflow-x:auto;padding:4px 2px 6px;margin:0 -16px;padding-left:16px;padding-right:16px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:none;background:#fff;color:var(--ink2);font-weight:700;font-size:14px;padding:10px 16px;border-radius:999px;box-shadow:var(--shadow-sm);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
  .chip.active{background:var(--blue);color:#fff;box-shadow:0 6px 16px -8px var(--blue)}

  /* Search */
  .search{display:flex;align-items:center;gap:10px;background:#fff;border-radius:16px;box-shadow:var(--shadow-sm);padding:13px 16px;margin:6px 0 4px}
  .search input{border:none;outline:none;font-family:inherit;font-size:15px;width:100%;background:none;color:var(--ink)}
  .search input::placeholder{color:var(--ink3)}

  /* Back */
  .back{display:inline-flex;align-items:center;gap:6px;background:#fff;border:none;box-shadow:var(--shadow-sm);border-radius:14px;padding:9px 15px;font-weight:800;font-size:15px;color:var(--ink);cursor:pointer;font-family:inherit;margin:2px 0 8px}

  /* Phrase card */
  .phrase .p-es{font-weight:800;font-size:16px}
  .phrase .p-jp{color:var(--blue);font-weight:700;font-size:23px;margin:3px 0 1px;letter-spacing:0}
  .phrase .p-ro{color:var(--ink2);font-style:italic;font-size:14px;font-weight:500}

  /* Bottom nav */
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:center;pointer-events:none}
  .tabbar-inner{pointer-events:auto;display:flex;gap:2px;background:rgba(255,255,255,.86);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid rgba(0,0,0,.04);width:100%;max-width:var(--maxw);padding:8px 8px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -8px 24px -16px rgba(31,46,84,.3)}
  .tab{flex:1;border:none;background:none;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;border-radius:16px;cursor:pointer;color:var(--ink3);font-weight:700;font-size:11px;transition:color .15s}
  .tab .ti{font-size:21px;line-height:1;filter:grayscale(.3) opacity(.6)}
  .tab.active{color:var(--blue)}
  .tab.active .ti{filter:none;transform:translateY(-1px)}
  .tab.active{background:var(--blue-soft)}

  .muted{color:var(--ink2);font-size:14.5px;line-height:1.55}
  .pill-day{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.92);color:var(--ink);font-weight:800;font-size:13px;padding:5px 12px;border-radius:999px;backdrop-filter:blur(4px)}
  .pill-hoy{position:absolute;top:14px;right:14px;background:var(--blue);color:#fff;font-weight:800;font-size:12px;padding:5px 11px;border-radius:999px}
  .day-card-photo{height:150px;border-radius:20px}
  .day-card-photo .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(0,0,0,.6))}
  .day-card-photo .dc-txt{position:absolute;left:16px;right:16px;bottom:14px;color:#fff}
  .day-card-photo .dc-date{font-size:13px;font-weight:600;opacity:.92}
  .day-card-photo .dc-title{font-size:19px;font-weight:800;line-height:1.15;margin-top:2px}
  .linkrow{display:flex;align-items:center;gap:8px;color:var(--blue-d);font-weight:800;font-size:15px;margin-top:13px;cursor:pointer}
  a.clean{color:inherit;text-decoration:none}
  .toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;border-radius:999px;opacity:0;transition:.25s;z-index:99;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .small-note{font-size:12.5px;color:var(--ink3);font-weight:600;margin-top:8px}
</style>
</head>

const $ = (s,el=document)=>el.querySelector(s);
const app = $("#app");
const esc = s => (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const mapsUrl = q => "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);
const placeById = id => PLACES.find(p=>p.id===id);
const hotelById = id => HOTELS.find(h=>h.id===id);

function fmtDate(iso){
  const d = new Date(iso+"T00:00:00");
  let s = d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}
function fmtShort(iso){
  const d = new Date(iso+"T00:00:00");
  return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
}

/* Photo block with graceful fallback to gradient + emoji */
function photo(o){
  const {photo, emoji, grad, cls=""} = o;
  const bg = grad || "linear-gradient(160deg,#7fb2ff,#3b6fd4)";
  const id = "img"+Math.random().toString(36).slice(2,8);
  const imgTag = photo
    ? `<img src="${esc(photo)}" alt="" loading="lazy" onload="this.classList.add('loaded')" onerror="this.remove()">`
    : "";
  return `<div class="photo ${cls}" style="background:${bg}"><span class="ph-emoji">${emoji||"📍"}</span>${imgTag}</div>`;
}
function catPhoto(p, cls){
  const c = CATS[p.cat]||{};
  return photo({photo:p.photo, emoji:c.emoji, grad:c.grad, cls});
}

/* Current / next day relative to today */
function activeDayIndex(){
  const today = new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<DAYS.length;i++){
    const d = new Date(DAYS[i].date+"T00:00:00");
    if(d.getTime() >= today.getTime()) return i;
  }
  return DAYS.length-1;
}
function daysUntilStart(){
  const today = new Date(); today.setHours(0,0,0,0);
  const s = new Date(TRIP.start+"T00:00:00");
  return Math.round((s-today)/86400000);
}

let mapFilter = "todos";
let mapSearch = "";
function vMapa(){
  const cities = [...new Set(PLACES.map(p=>p.city))];
  let list = PLACES.filter(p=>(mapFilter==="todos"||p.cat===mapFilter));
  if(mapSearch) list = list.filter(p=>(p.name+" "+p.city).toLowerCase().includes(mapSearch.toLowerCase()));
  const chips = [["todos","Todos","🗾"], ...Object.entries(CATS).map(([k,v])=>[k,v.label,v.emoji])];
  let html = `<div class="view">
    <h1 class="page-title">Mapa de lugares</h1>
    <p class="page-sub">Todos los sitios del viaje: toca «Info» o ábrelos en Google Maps.</p>
    <div class="search">🔍 <input id="mapsearch" placeholder="Buscar lugar..." value="${esc(mapSearch)}" oninput="mapSearch=this.value;repaintMapList()"></div>
    <div class="filters">${chips.map(c=>`<button class="chip ${mapFilter===c[0]?'active':''}" onclick="mapFilter='${c[0]}';render()">${c[2]} ${esc(c[1])}</button>`).join("")}</div>
    <div id="maplist">${renderMapList(list,cities)}</div></div>`;
  return html;
}
function renderMapList(list,cities){
  if(!list.length) return `<div class="card" style="text-align:center;color:var(--ink2)">No hay lugares para este filtro.</div>`;
  cities = cities || [...new Set(list.map(p=>p.city))];
  let out = "";
  cities.forEach(city=>{
    const inCity = list.filter(p=>p.city===city);
    if(!inCity.length) return;
    out += `<div class="section-h" style="margin-top:20px"><span class="ic">📍</span> ${esc(city)}</div>`;
    const byCat = {};
    inCity.forEach(p=>{(byCat[p.cat]=byCat[p.cat]||[]).push(p)});
    Object.entries(byCat).forEach(([cat,arr])=>{
      const cc = CATS[cat]||{};
      out += `<div class="sub-section">${cc.emoji} ${esc(cc.label)}</div>`;
      arr.forEach(p=>{
        out += `<div class="card tight"><div class="row">
          ${catPhoto(p)}
          <div class="row-body">
            <div class="row-title">${esc(p.name)}</div>
            <div class="row-loc">📍 ${esc(p.city)}</div>
            <div class="btn-row" style="margin-top:10px">
              <button class="btn btn-blue btn-sm" onclick="go('lugar/${p.id}')">ℹ️ Info</button>
              <a class="btn btn-gray btn-sm" href="${mapsUrl(p.name+' '+p.city)}" target="_blank" rel="noopener">📍 Maps</a>
            </div>
          </div></div></div>`;
      });
    });
  });
  return out;
}
function repaintMapList(){
  let list = PLACES.filter(p=>(mapFilter==="todos"||p.cat===mapFilter));
  if(mapSearch) list = list.filter(p=>(p.name+" "+p.city).toLowerCase().includes(mapSearch.toLowerCase()));
  const el = $("#maplist"); if(el) el.innerHTML = renderMapList(list);
}

/* ---------- ROUTER ---------- */
const TABS = [
  ["inicio","Inicio","🏠"],["dias","Días","📅"],["mapa","Mapa","📍"],["frases","Frases","💬"],["ayuda","Ayuda","🛟"]
];
function go(route){ location.hash = "#/"+route; }
function currentRoute(){ return (location.hash.replace(/^#\//,"")||"inicio"); }

function render(){
  const r = currentRoute();
  const [base,arg] = r.split("/");
  let html="";
  switch(base){
    case "inicio": html=vInicio(); break;
    case "dias": html=vDias(); break;
    case "dia": html=vDia(arg); break;
    case "mapa": html=vMapa(); break;
    case "lugar": html=vLugar(arg); break;
    case "frases": html=vFrases(); break;
    case "ayuda": html=vAyuda(); break;
    case "vuelos": html=vVuelos(); break;
    case "hoteles": html=vHoteles(); break;
    case "seguro": html=vSeguro(); break;
    case "documentos": html=vDocumentos(); break;
    default: html=vInicio();
  }
  app.innerHTML = html;
  window.scrollTo(0,0);
  renderTabs(base);
}
function renderTabs(base){
  const map = {inicio:"inicio",dias:"dias",dia:"dias",mapa:"mapa",lugar:"mapa",frases:"frases",ayuda:"ayuda",seguro:"ayuda",vuelos:"inicio",hoteles:"inicio",documentos:"inicio"};
  const act = map[base]||"inicio";
  $("#tabbar").innerHTML = TABS.map(t=>`<button class="tab ${act===t[0]?'active':''}" onclick="go('${t[0]}')">
    <span class="ti">${t[2]}</span><span>${t[1]}</span></button>`).join("");
}

/* ---------- HELPERS ---------- */
function speak(text, btn){
  if(!('speechSynthesis' in window)){ toast("Tu navegador no puede reproducir audio."); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP"; u.rate = .9;
  const v = speechSynthesis.getVoices().find(x=>x.lang&&x.lang.toLowerCase().startsWith("ja"));
  if(v) u.voice = v;
  if(btn){ const o=btn.innerHTML; btn.innerHTML="🔊 Reproduciendo…"; u.onend=()=>btn.innerHTML=o; u.onerror=()=>btn.innerHTML=o; }
  speechSynthesis.speak(u);
}
function copyVal(val, btn){
  navigator.clipboard?.writeText(val).then(()=>{ toast("Copiado ✓"); if(btn){const o=btn.textContent;btn.textContent="¡Copiado!";setTimeout(()=>btn.textContent=o,1200);} })
  .catch(()=>toast("No se pudo copiar"));
}
let toastT;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1600);
}

window.addEventListener("hashchange",render);
window.speechSynthesis && speechSynthesis.getVoices(); // warm up voices
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
render();
</script>
